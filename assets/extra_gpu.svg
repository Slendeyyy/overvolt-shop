<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Graphics Card GPU -->
  <g transform="translate(10, 40)">
    <!-- Main board body -->
    <rect x="0" y="20" width="180" height="90" rx="6" fill="#131020" stroke="#2a2440" stroke-width="3"/>
    <!-- Metal bracket -->
    <rect x="-6" y="10" width="6" height="100" fill="#2a2440" rx="1"/>
    <!-- Glowing fans -->
    <circle cx="50" cy="65" r="32" stroke="#00f0ff" stroke-width="2.5" fill="#181425"/>
    <circle cx="50" cy="65" r="12" fill="#ff2e7e" opacity="0.8"/>
    <circle cx="130" cy="65" r="32" stroke="#00f0ff" stroke-width="2.5" fill="#181425"/>
    <circle cx="130" cy="65" r="12" fill="#ff2e7e" opacity="0.8"/>
    <!-- Top RGB bar -->
    <rect x="20" y="12" width="140" height="8" rx="2" fill="url(#gpu-rgb-grad)"/>
    <line x1="20" y1="20" x2="160" y2="20" stroke="#2a2440" stroke-width="1.5"/>
    <!-- Backplate lines -->
    <path d="M 10 110 H 170" stroke="#2a2440" stroke-width="1.5"/>
  </g>
  <defs>
    <linearGradient id="gpu-rgb-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#ff2e7e"/>
      <stop offset="100%" stop-color="#c6ff3d"/>
    </linearGradient>
  </defs>
</svg>
