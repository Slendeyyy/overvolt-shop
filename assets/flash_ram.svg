<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- RAM Stick -->
  <g transform="translate(10, 50)">
    <!-- PCB Board -->
    <rect x="0" y="30" width="180" height="45" rx="3" fill="#131020" stroke="#2a2440" stroke-width="2"/>
    <!-- Gold Contacts -->
    <rect x="10" y="75" width="160" height="6" fill="#ffd700"/>
    <line x1="15" y1="75" x2="15" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="25" y1="75" x2="25" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="35" y1="75" x2="35" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="45" y1="75" x2="45" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="55" y1="75" x2="55" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="65" y1="75" x2="65" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="75" y1="75" x2="75" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="85" y1="75" x2="85" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="95" y1="75" x2="95" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="105" y1="75" x2="105" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="115" y1="75" x2="115" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="125" y1="75" x2="125" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="135" y1="75" x2="135" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="145" y1="75" x2="145" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="155" y1="75" x2="155" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <line x1="165" y1="75" x2="165" y2="81" stroke="#0b0a14" stroke-width="1.5"/>
    <!-- Memory Chips -->
    <rect x="15" y="38" width="30" height="28" rx="2" fill="#181425" stroke="#2a2440"/>
    <rect x="55" y="38" width="30" height="28" rx="2" fill="#181425" stroke="#2a2440"/>
    <rect x="95" y="38" width="30" height="28" rx="2" fill="#181425" stroke="#2a2440"/>
    <rect x="135" y="38" width="30" height="28" rx="2" fill="#181425" stroke="#2a2440"/>
    <!-- Heat Spreader / RGB strip -->
    <path d="M0 30 L180 30 L180 20 L150 15 L30 15 L0 20 Z" fill="url(#rgb-grad)"/>
    <line x1="0" y1="30" x2="180" y2="30" stroke="#00f0ff" stroke-width="2"/>
  </g>
  <!-- Glow filters -->
  <defs>
    <linearGradient id="rgb-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff2e7e"/>
      <stop offset="50%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#c6ff3d"/>
    </linearGradient>
  </defs>
</svg>
