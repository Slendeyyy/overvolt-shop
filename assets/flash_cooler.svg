  <rect x="15" y="20" width="170" height="40" rx="4" fill="#131020" stroke="#2a2440" stroke-width="2.5"/>
  <!-- Fans inside Radiator -->
  <circle cx="50" cy="40" r="14" stroke="#00f0ff" stroke-width="1.5" fill="#181425"/>
  <circle cx="100" cy="40" r="14" stroke="#ff2e7e" stroke-width="1.5" fill="#181425"/>
  <circle cx="150" cy="40" r="14" stroke="#00f0ff" stroke-width="1.5" fill="#181425"/>
  <!-- CPU Block -->
  <rect x="75" y="110" width="50" height="50" rx="6" fill="#131020" stroke="#00f0ff" stroke-width="2"/>
  <circle cx="100" cy="135" r="14" stroke="#ff2e7e" stroke-width="1.5"/>
  <!-- Tubes -->
  <path d="M 40 60 C 40 90, 75 120, 75 125" stroke="#2a2440" stroke-width="6" fill="none"/>
  <path d="M 40 60 C 40 90, 75 120, 75 125" stroke="#ff2e7e" stroke-width="2" fill="none"/>
