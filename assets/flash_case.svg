<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ATX Case -->
  <g transform="translate(45, 15)">
    <!-- Outer Chassis -->
    <rect x="0" y="0" width="110" height="170" rx="8" fill="#131020" stroke="#2a2440" stroke-width="3"/>
    <!-- Glass Panel Side -->
    <rect x="6" y="6" width="98" height="158" rx="4" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.4"/>
    <!-- Front mesh section (left side since it is angled) -->
    <line x1="0" y1="0" x2="0" y2="170" stroke="#ff2e7e" stroke-width="4"/>
    <!-- Internal Fans -->
    <circle cx="55" cy="50" r="22" stroke="#00f0ff" stroke-width="2" fill="#181425"/>
    <circle cx="55" cy="50" r="10" fill="#ff2e7e" opacity="0.6"/>
    <circle cx="55" cy="110" r="22" stroke="#00f0ff" stroke-width="2" fill="#181425"/>
    <circle cx="55" cy="110" r="10" fill="#ff2e7e" opacity="0.6"/>
    <!-- Internal Motherboard blueprint line -->
    <path d="M 20 80 H 40 V 100" stroke="#2a2440" stroke-width="2"/>
  </g>
</svg>
